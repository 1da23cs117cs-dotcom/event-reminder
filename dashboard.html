<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>📅</h2>

    <button onclick="showSection('dashboardSection')">📊 Dashboard</button>
    <button onclick="showSection('addSection')">➕ Add Event</button>
    <button onclick="showSection('viewSection')">📋 View Events</button>
    <button onclick="logout()">🚪 Logout</button>
  </div>

  <!-- Content -->
  <div class="content">

    <!-- Dashboard -->
    <div id="dashboardSection">
      <h2>📊 Stats</h2>
      <div class="cards">
        <div class="card">
          <h3>Total</h3>
          <p id="total">0</p>
        </div>
        <div class="card">
          <h3>Upcoming</h3>
          <p id="upcoming">0</p>
        </div>
        <div class="card">
          <h3>Past</h3>
          <p id="past">0</p>
        </div>
      </div>
    </div>

    <!-- Add Event -->
    <div id="addSection" style="display:none;">
      <h2>Add Event</h2>

      <input id="title" placeholder="Event Title">
      <input id="remail" placeholder="Reminder Email">
      <input id="etime" type="datetime-local">
      <input id="rtime" type="datetime-local">

      <button onclick="addEvent()">Save Event</button>
    </div>

    <!-- View Events -->
    <div id="viewSection" style="display:none;">
      <h2>Your Events</h2>
      <div id="events"></div>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
