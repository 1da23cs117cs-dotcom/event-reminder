<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body onload="init()">

<div class="layout">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>📅</h2>

    <button onclick="showSection('dashboard')">📊 Dashboard</button>
    <button onclick="showSection('add')">➕ Add Event</button>
    <button onclick="showSection('view')">📋 View Events</button>
    <button onclick="logout()">🚪 Logout</button>
  </div>

  <!-- Main -->
  <div class="main">

    <!-- Stats -->
    <div id="dashboardSection">
      <h2>📊 Stats</h2>

      <div class="stats">
        <div class="card">Total<br><span id="total">0</span></div>
        <div class="card">Upcoming<br><span id="upcoming">0</span></div>
        <div class="card">Past<br><span id="past">0</span></div>
      </div>
    </div>

    <!-- Add -->
    <div id="addSection" style="display:none;">
      <h2>Add Event</h2>

      <input id="title" placeholder="Event Title">
      <input id="remail" placeholder="Reminder Email">
      <input id="etime" type="datetime-local">
      <input id="rtime" type="datetime-local">

      <button onclick="addEvent()">Save Event</button>
    </div>

    <!-- View -->
    <div id="viewSection" style="display:none;">
      <h2>Your Events</h2>
      <div id="events"></div>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
