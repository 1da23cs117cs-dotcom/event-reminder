<!DOCTYPE html>
<html>
<head>
  <title>Event Reminder</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      background: rgba(30, 41, 59, 0.85);
      backdrop-filter: blur(15px);
      padding: 25px;
      border-radius: 20px;
      width: 350px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.6);
      color: white;
    }

    h2 {
      text-align: center;
      margin-bottom: 10px;
    }

    p {
      text-align: center;
      color: #94a3b8;
      margin-bottom: 15px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 6px 0;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #020617;
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(90deg, #38bdf8, #0ea5e9);
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      opacity: 0.9;
      transform: scale(1.02);
    }
  </style>
</head>

<body>

<div class="container">
  <h2>📅 Event Reminder</h2>
  <p>Never miss your events 🚀</p>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
  <button onclick="signup()">Signup</button>
</div>

<script src="script.js"></script>
</body>
</html>
