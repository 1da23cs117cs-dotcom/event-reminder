<!DOCTYPE html>
<html>
<head>
<title>Event Reminder</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  background: rgba(30, 41, 59, 0.85);
  padding: 25px;
  border-radius: 20px;
  width: 380px;
  color: white;
}

input, button {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 8px;
  border: none;
}

input {
  background: #020617;
  color: white;
}

button {
  background: #38bdf8;
  cursor: pointer;
}

.event {
  background: #1e293b;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
}

.actions {
  margin-top: 5px;
}

.delete { background: red; }
.edit { background: green; }
</style>
</head>

<body>

<div class="container">
  <h2>📅 Event Reminder</h2>

  <!-- AUTH -->
  <input id="authEmail" placeholder="Email">
  <input id="authPassword" type="password" placeholder="Password">
  <button onclick="signup()">Signup</button>
  <button onclick="login()">Login</button>

  <hr>

  <!-- EVENT -->
  <input id="title" placeholder="Event Title">
  <input id="email" placeholder="Reminder Email">
  <input id="event_time" type="datetime-local">
  <input id="reminder_time" type="datetime-local">

  <button onclick="addEvent()">Add / Update Event</button>

  <div id="events"></div>
</div>

<script>
const API = "https://event-reminder-sg2s.onrender.com";

let editId = null;

// 🔐 TOKEN HELPER (IMPORTANT)
function getHeaders() {
  return {
    "Content-Type": "application/json",
    "Authorization": "Bearer " + localStorage.getItem("token")
  };
}

// SIGNUP
async function signup() {
  const res = await fetch(API + "/signup", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      email: authEmail.value,
      password: authPassword.value
    })
  });

  const data = await res.json();
  alert(data.message || data.error);
}

// LOGIN
async function login() {
  const res = await fetch(API + "/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      email: authEmail.value,
      password: authPassword.value
    })
  });

  const data = await res.json();

  if (data.token) {
    localStorage.setItem("token", data.token);
    alert("Login successful ✅");
    loadEvents();
  } else {
    alert(data.error);
  }
}

// LOAD EVENTS
async function loadEvents() {
  const res = await fetch(API + "/events", {
    headers: getHeaders()
  });

  if (!res.ok) {
    alert("Please login first ❌");
    return;
  }

  const data = await res.json();
  const container = document.getElementById("events");
  container.innerHTML = "";

  data.forEach(e => {
    container.innerHTML += `
      <div class="event">
        <b>${e.title}</b><br>
        📧 ${e.email}<br>
        ⏰ ${new Date(e.event_time).toLocaleString()}<br>
        🔔 ${new Date(e.reminder_time).toLocaleString()}

        <div class="actions">
          <button class="edit" onclick="editEvent(${e.id})">Edit</button>
          <button class="delete" onclick="deleteEvent(${e.id})">Delete</button>
        </div>
      </div>
    `;
  });
}

// ADD / UPDATE
async function addEvent() {
  if (!title.value || !email.value || !event_time.value || !reminder_time.value) {
    alert("Fill all fields");
    return;
  }

  const body = {
    title: title.value,
    email: email.value,
    event_time: new Date(event_time.value).toISOString(),
    reminder_time: new Date(reminder_time.value).toISOString()
  };

  const method = editId ? "PUT" : "POST";
  const url = editId ? `${API}/events/${editId}` : `${API}/events`;

  await fetch(url, {
    method,
    headers: getHeaders(),
    body: JSON.stringify(body)
  });

  editId = null;
  clearForm();
  loadEvents();
}

// EDIT
async function editEvent(id) {
  editId = id;

  const res = await fetch(API + "/events", {
    headers: getHeaders()
  });

  const data = await res.json();
  const e = data.find(x => x.id === id);

  title.value = e.title;
  email.value = e.email;
  event_time.value = new Date(e.event_time).toISOString().slice(0,16);
  reminder_time.value = new Date(e.reminder_time).toISOString().slice(0,16);
}

// DELETE
async function deleteEvent(id) {
  await fetch(`${API}/events/${id}`, {
    method: "DELETE",
    headers: getHeaders()
  });

  loadEvents();
}

// CLEAR
function clearForm() {
  title.value = "";
  email.value = "";
  event_time.value = "";
  reminder_time.value = "";
}
</script>

</body>
</html>
