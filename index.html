<!DOCTYPE html>
<html>
<head>
<title>Event Reminder</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

/* Container */
.container {
  background: rgba(30, 41, 59, 0.9);
  backdrop-filter: blur(10px);
  padding: 25px;
  border-radius: 16px;
  width: 350px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  color: white;
}

/* Title */
h2 {
  text-align: center;
  margin-bottom: 15px;
}

/* Inputs */
input {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  border-radius: 8px;
  border: none;
  outline: none;
  background: #0f172a;
  color: white;
}

input::placeholder {
  color: #94a3b8;
}

/* Button */
button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(90deg, #38bdf8, #0ea5e9);
  color: white;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.03);
}

/* Success message */
.success {
  background: #22c55e;
  padding: 8px;
  border-radius: 6px;
  text-align: center;
  margin-top: 10px;
  display: none;
}

/* Event Card */
.event {
  background: #334155;
  padding: 12px;
  margin-top: 12px;
  border-radius: 10px;
  transition: 0.2s;
}

.event:hover {
  transform: scale(1.02);
}

/* Title bold */
.event b {
  font-size: 16px;
}

/* Icons spacing */
.event span {
  display: block;
  margin-top: 3px;
  color: #cbd5f5;
  font-size: 14px;
}

/* Buttons */
.actions {
  margin-top: 10px;
  display: flex;
  gap: 6px;
}

.actions button {
  flex: 1;
  font-size: 12px;
}

.delete {
  background: #ef4444;
}

.edit {
  background: #22c55e;
}

/* Scroll */
#events {
  max-height: 250px;
  overflow-y: auto;
}
</style>
</head>

<body>

<div class="container">
  <h2>📅 Event Reminder</h2>

  <input id="title" placeholder="Event Title">
  <input id="email" placeholder="Email">
  <input id="event_time" type="datetime-local">
  <input id="reminder_time" type="datetime-local">

  <button onclick="addEvent()">Add Event</button>

  <div class="success" id="successMsg">✅ Event saved!</div>

  <div id="events"></div>
</div>

<script>
const API = "https://event-reminder-sg2s.onrender.com/events";

let editId = null;

async function loadEvents() {
  const res = await fetch(API);
  const data = await res.json();

  const container = document.getElementById("events");
  container.innerHTML = "";

  data.forEach(e => {
    container.innerHTML += `
      <div class="event">
        <b>${e.title}</b>
        <span>📧 ${e.email}</span>
        <span>⏰ ${new Date(e.event_time).toLocaleString()}</span>
        <span>🔔 ${new Date(e.reminder_time).toLocaleString()}</span>

        <div class="actions">
          <button class="edit" onclick="editEvent(${e.id})">Edit</button>
          <button class="delete" onclick="deleteEvent(${e.id})">Delete</button>
        </div>
      </div>
    `;
  });
}

async function addEvent() {
  const body = {
    title: title.value,
    email: email.value,
    event_time: new Date(event_time.value).toISOString(),
    reminder_time: new Date(reminder_time.value).toISOString()
  };

  if (!title.value || !email.value) {
    alert("Please fill all fields");
    return;
  }

  if (editId) {
    await fetch(`${API}/${editId}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });
    editId = null;
  } else {
    await fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });
  }

  showSuccess();
  clearForm();
  loadEvents();
}

function editEvent(id) {
  editId = id;

  fetch(API)
    .then(res => res.json())
    .then(data => {
      const e = data.find(x => x.id === id);

      title.value = e.title;
      email.value = e.email;
      event_time.value = new Date(e.event_time)
         .toLocaleString('sv-SE')
         .replace(' ', 'T')
         .slice(0,16);

      reminder_time.value = new Date(e.reminder_time)
         .toLocaleString('sv-SE')
         .replace(' ', 'T')
         .slice(0,16);
    });
}

async function deleteEvent(id) {
  await fetch(`${API}/${id}`, {
    method: "DELETE"
  });

  loadEvents();
 

}

function clearForm() {
  title.value = "";
  email.value = "";
  event_time.value = "";
  reminder_time.value = "";
}

function showSuccess() {
  const msg = document.getElementById("successMsg");
  msg.style.display = "block";

  setTimeout(() => {
    msg.style.display = "none";
  }, 2000);
}

loadEvents();
</script>

</body>
</html>
