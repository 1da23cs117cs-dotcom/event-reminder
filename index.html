<!DOCTYPE html>
<html>
<head>
<title>Event Reminder</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.container {
  background: rgba(30, 41, 59, 0.9);
  padding: 25px;
  border-radius: 20px;
  width: 380px;
  color: white;
}

input, button {
  width: 100%;
  padding: 12px;
  margin: 6px 0;
  border-radius: 10px;
  border: none;
}

input {
  background: #020617;
  color: white;
}

button {
  background: #38bdf8;
  cursor: pointer;
}

.event {
  background: #1e293b;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h2>📅 Event Reminder</h2>

  <!-- AUTH -->
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="signup()">Signup</button>
  <button onclick="login()">Login</button>

  <hr>

  <!-- EVENTS -->
  <input id="title" placeholder="Event Title">
  <input id="remail" placeholder="Reminder Email">
  <input id="etime" type="datetime-local">
  <input id="rtime" type="datetime-local">

  <button onclick="addEvent()">Add Event</button>

  <div id="events"></div>
</div>

<script>
const API = "https://event-reminder-sg2s.onrender.com";

// ================= SIGNUP =================
async function signup() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch(API + "/signup", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();
  alert(res.ok ? "Signup successful ✅" : data.error);
}

// ================= LOGIN =================
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch(API + "/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if (res.ok) {
    localStorage.setItem("token", data.token);
    alert("Login successful ✅");
    loadEvents();
  } else {
    alert(data.error);
  }
}

// ================= ADD EVENT =================
async function addEvent() {
  const token = localStorage.getItem("token");

  if (!token) {
    alert("Login first ❌");
    return;
  }

  const body = {
    title: document.getElementById("title").value,
    email: document.getElementById("remail").value,
    event_time: new Date(document.getElementById("etime").value).toISOString(),
    reminder_time: new Date(document.getElementById("rtime").value).toISOString()
  };

  const res = await fetch(API + "/events", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + token
    },
    body: JSON.stringify(body)
  });

  const data = await res.json();
  alert(res.ok ? "Event added ✅" : data.error);

  loadEvents();
}

// ================= LOAD EVENTS =================
async function loadEvents() {
  const token = localStorage.getItem("token");
  if (!token) return;

  const res = await fetch(API + "/events", {
    headers: { Authorization: "Bearer " + token }
  });

  const data = await res.json();

  const div = document.getElementById("events");
  div.innerHTML = "";

  if (!Array.isArray(data)) {
    console.log("Not array:", data);
    return; // 👈 prevents crash
  }

  data.forEach(e => {
    div.innerHTML += `
      <div class="event">
        <b>${e.title}</b><br>
        ${new Date(e.event_time).toLocaleString()}
      </div>
    `;
  });
}

// Load on start
loadEvents();
</script>

</body>
</html>
